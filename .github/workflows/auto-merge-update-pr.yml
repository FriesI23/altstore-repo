name: Auto-merge Update PRs

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge eligible update PRs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          threshold=7200 # 2 hours

          now=$(date -u +%s)

          # PRs are generated by .github/workflows/update.yml in this repo,
          # with head like "auto-update-<timestamp>" and a fixed title "Auto Update source".
          gh pr list --repo "$REPO" --state open \
            --json number,headRefName,title,createdAt,isDraft,mergeable --limit 100 \
            | jq -c '.[]' \
            | while read -r pr; do
                number=$(jq -r .number <<<"$pr")
                headRef=$(jq -r .headRefName <<<"$pr")
                title=$(jq -r .title <<<"$pr")
                createdAt=$(jq -r .createdAt <<<"$pr")
                isDraft=$(jq -r .isDraft <<<"$pr")
                mergeable=$(jq -r .mergeable <<<"$pr")

                if [[ "$headRef" != auto-update-* ]]; then
                  echo "Skip #$number: not an auto-update PR ($headRef)"
                  continue
                fi
                if [[ "$title" != "Auto Update source" ]]; then
                  echo "Skip #$number: title does not match ($title)"
                  continue
                fi
                if [[ "$isDraft" == "true" ]]; then
                  echo "Skip #$number: draft"
                  continue
                fi
                if [[ "$mergeable" == "CONFLICTING" ]]; then
                  echo "Skip #$number: has conflicts"
                  continue
                fi

                createdEpoch=$(date -u -d "$createdAt" +%s)
                age=$(( now - createdEpoch ))
                if (( age < threshold )); then
                  echo "Skip #$number: only ${age}s old (need ${threshold}s)"
                  continue
                fi

                echo "Merging #$number (age ${age}s)"
                gh pr merge "$number" --repo "$REPO" --squash --delete-branch \
                  || echo "Failed to merge #$number"
              done
