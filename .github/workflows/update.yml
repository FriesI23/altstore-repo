name: Update AltStore/SideStore Source

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Check Poetry version
        run: poetry --version

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: master

      - name: Configure git
        run: |
          git config user.name "Fries_I23"
          git config user.email "20661034+FriesI23@users.noreply.github.com"

      - name: Create branch
        id: branch
        run: |
          BRANCH_NAME="auto-update-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Update
        id: update
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
        run: |
          cd scripts/update_repo
          poetry install
          poetry run python update_repo.py -s ../../_site/repo/source.json
          cd ../..
          git add _site/repo/source.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update source on $(date +%Y-%m-%d)"
            git push origin "$BRANCH_NAME"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.update.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          BASE_BRANCH_NAME: master
          BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
        run: |
          gh pr create \
            --base "$BASE_BRANCH_NAME" \
            --head "$BRANCH_NAME" \
            --title "Auto Update source" \
            --body "Automated update source on $(date +%Y-%m-%d)."
